<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <h1>Exemplo de Formularios</h1>
    <form>
        <label for="iptNomeID" id="lblNome">Nome: </label>
        <input type="text" id="iptNomeID" name="iptNomeName" placeholder="Nome Completo">
        <label for="iptPassID" id="lblPass">Senha: </label>
        <input type="password" id="iptPassID" name="iptPassName">
        <br>

        <span>Qual o seu Semestre ?</span><br>

        <input type="radio" id="ipt1" name="qual_o_seu_semestre" value="1">
        <label for="ipt1">Primeiro Semestre </label><br>
        <input type="radio" id="ipt2" name="qual_o_seu_semestre" value="2">
        <label for="ipt2">Segundo Semestre</label><br>
        <input type="radio" id="iptr3" name="qual_o_seu_semestre" value="3">
        <label for="ipt3">Terceiro Semestre</label>
        <br>

        <span>Qual a suas diciplinas favoritas?</span><br>
        <input type="checkbox" id="WEB1" name="WEB" value="web">
        <label for="WEB1"> Programacao pra Web</label><br>
        <input type="checkbox" id="SO1" name="SO" value="so">
        <label for="SO1"> Sistemas Operacionais</label><br>
        <input type="checkbox" id="POO1" name="POO" value="poo">
        <label for="POO1"> programação orientada a objetos</label>
        <br>

        <span>Qual sua cor favorita? </span>
        <input type="color">
        <br>
        <span>Qual a data do seu nascimento?</span>
        <input type="date">
        <br>
        <span>Qual a sua idade?</span>
        <input type="number"  value="enviar">
        <br>
       
        <span>Qual a cidade que voce mora?</span>
        <select id="Cidade" name="Cidade">
        <option value="fortaleza">Fortaleza</option>
        <option value="rio de janeiro">Rio de janeiro</option>
        <option value="para">Para</option>
        <option value="sao paulo">Sao paulo</option>
    </select>
        <br>
        <input type="reset" value="limpar">
        <input type="button" value="Enviar">

    </form>
</body>
</html>
